  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Select Xcode 16
  #       run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
  #     - name: Import signing certificate
  #       env:
  #         P12_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE_P12_BASE64 }}
  #         P12_PASSWORD: ${{ secrets.DEVELOPER_CERTIFICATE_PASSWORD }}
  #       run: |
  #         echo "$P12_BASE64" | base64 --decode > cert.p12
  #         security create-keychain -p "" build.keychain
  #         security default-keychain -s build.keychain
  #         security unlock-keychain -p "" build.keychain
  #         security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
  #         security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
  #         rm cert.p12
  #     - name: Build signed and notarised DMG
  #       env:
  #         APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  #         APPLE_ID: ${{ secrets.APPLE_ID }}
  #         APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  #       run: ./scripts/build-dmg.sh --sign --notarise

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Fallow-unsigned

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: Fallow.dmg
