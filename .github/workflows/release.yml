name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned DMG
        run: ./scripts/build-dmg.sh

      - name: Upload unsigned DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fallow-unsigned
          path: build/Fallow.dmg

  # Signing and notarisation: uncomment when secrets are configured.
