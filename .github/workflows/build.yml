name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-spm:
    name: Swift Package Manager
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show build environment
        run: swift --version

      - name: Build
        working-directory: Fallow
        run: swift build

  build-xcode:
    name: Xcode
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 16.x found, using default"
            xcodebuild -version
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            xcodebuild -version
          fi

      - name: Build
        run: |
          xcodebuild build \
            -project Fallow/Fallow.xcodeproj \
            -scheme Fallow \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
