name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-spm:
    name: Swift Package Manager
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show build environment
        run: swift --version

      - name: Build
        working-directory: Fallow
        run: swift build

  build-xcode:
    name: Xcode
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: |
          xcodebuild build \
            -project Fallow/Fallow.xcodeproj \
            -scheme Fallow \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
